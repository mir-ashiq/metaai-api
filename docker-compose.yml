version: '3.8'

services:
  metaai-api:
    build: .
    container_name: metaai-api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      # Add your Meta AI cookies here or use .env file
      - META_AI_COOKIES_JSON=${META_AI_COOKIES_JSON}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
